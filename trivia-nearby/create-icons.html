<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <h1>Generate PWA Icons</h1>
  <p>Open this file in a browser, right-click each icon and save as PNG:</p>
  
  <h2>192x192 Icon</h2>
  <img src="icon.svg" width="192" height="192" style="background: white; padding: 20px;">
  
  <h2>512x512 Icon</h2>
  <img src="icon.svg" width="512" height="512" style="background: white; padding: 20px;">
  
  <h2>180x180 Icon (iOS)</h2>
  <img src="icon.svg" width="180" height="180" style="background: white; padding: 20px;">
  
  <p>Save these as: icon-192.png, icon-512.png, and icon-180.png in the public folder</p>
</body>
</html>
